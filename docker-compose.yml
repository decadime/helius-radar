services:
  postgres:
    image: postgres:16-alpine
    container_name: helius_radar_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: helius
      POSTGRES_PASSWORD: helius
      POSTGRES_DB: helius_radar
    ports:
      - "5432:5432"
    volumes:
      - helius_radar_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U helius -d helius_radar"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  helius_radar_pgdata:
